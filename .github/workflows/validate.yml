name: Validate Content

on:
  pull_request:
    paths:
      - "content/**"
      - "lib/schemas.ts"
  push:
    branches: [main]
    paths:
      - "content/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate content schemas
        run: npm run validate

      - name: Run unit tests
        run: npm run test:unit
